# Voyager AI — NeMo Guardrails configuration
# Guardrail LLM: Groq llama-3.1-8b-instant (fast safety checks)
# Generation stays in main.py LangGraph agents (llama-3.3-70b-versatile)

models:
  - type: main
    engine: openai
    model: llama-3.1-8b-instant
    parameters:
      base_url: https://api.groq.com/openai/v1
      temperature: 0
    api_key_env_var: GROQ_API_KEY

  - type: self_check_input
    engine: openai
    model: llama-3.1-8b-instant
    parameters:
      base_url: https://api.groq.com/openai/v1
      temperature: 0
    api_key_env_var: GROQ_API_KEY

  - type: self_check_output
    engine: openai
    model: llama-3.1-8b-instant
    parameters:
      base_url: https://api.groq.com/openai/v1
      temperature: 0
    api_key_env_var: GROQ_API_KEY

instructions:
  - type: general
    content: |
      You are Voyager AI, a travel planning assistant.
      Help users plan safe, legitimate trips with flights, hotels, weather, and itineraries.
      Refuse harmful, illegal, or off-topic requests that are not related to travel planning.

rails:
  input:
    flows:
      - unsafe topic protection
      - jailbreak protection
      - prompt injection protection
      - toxic language protection
      - check input for pii
      - self check input
  output:
    flows:
      - sanitize bot response
      - self check output

prompting_mode: standard
