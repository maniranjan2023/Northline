        <rect x="40" y="424" width="640" height="104" rx="10" class="c-lane" stroke-width="1"/>
        <text x="54" y="446" class="t-dim" font-size="10" font-weight="600">04 / Router</text>

        <rect x="40" y="548" width="640" height="104" rx="10" class="c-lane" stroke-width="1"/>
        <text x="54" y="570" class="t-dim" font-size="10" font-weight="600">05 / Execution</text>

