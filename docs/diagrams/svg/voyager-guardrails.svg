<svg viewBox="0 0 900 720" role="img" aria-label="Voyager AI — Guardrails Flow — Layered input safety before agents run (sequence diagram)">
        <!-- Definitions -->
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="m-default" />
          </marker>
          <marker id="arrowhead-emphasis" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="m-emphasis" />
          </marker>
          <marker id="arrowhead-security" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="m-security" />
          </marker>
          <marker id="arrowhead-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="m-dashed" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" class="c-grid" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background Grid -->
        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- Time Segments -->
        <rect x="48" y="160" width="804" height="240" rx="10" class="c-lane" stroke-width="1"/>
        <text x="62" y="178" class="t-dim" font-size="9" font-weight="600">INPUT GUARDRAILS</text>

        <!-- Lifelines -->
        <path d="M 62 142 L 62 655" class="a-default" stroke-width="0.8" stroke-dasharray="3,7"/>
        <path d="M 170 142 L 170 655" class="a-default" stroke-width="0.8" stroke-dasharray="3,7"/>
        <path d="M 278 142 L 278 655" class="a-default" stroke-width="0.8" stroke-dasharray="3,7"/>
        <path d="M 386 142 L 386 655" class="a-default" stroke-width="0.8" stroke-dasharray="3,7"/>
        <path d="M 494 142 L 494 655" class="a-default" stroke-width="0.8" stroke-dasharray="3,7"/>
        <path d="M 602 142 L 602 655" class="a-default" stroke-width="0.8" stroke-dasharray="3,7"/>

        <!-- Messages -->
        <path d="M 69 180 L 163 180" class="a-emphasis" stroke-width="1.8" marker-end="url(#arrowhead-emphasis)"/>
        <rect x="78.8" y="160" width="74.4" height="16" rx="3" class="c-mask"/>
        <text x="116" y="170" class="t-backend" font-size="9" text-anchor="middle">user message</text>

        <path d="M 177 240 L 271 240" class="a-default" stroke-width="1.4" marker-end="url(#arrowhead)"/>
        <rect x="186.8" y="220" width="74.4" height="16" rx="3" class="c-mask"/>
        <text x="224" y="230" class="t-backend" font-size="9" text-anchor="middle">no regex hit</text>

        <path d="M 285 300 L 379 300" class="a-default" stroke-width="1.4" marker-end="url(#arrowhead)"/>
        <rect x="310.4" y="280" width="43.2" height="16" rx="3" class="c-mask"/>
        <text x="332" y="290" class="t-backend" font-size="9" text-anchor="middle">no PII</text>

        <path d="M 393 360 L 487 360" class="a-default" stroke-width="1.4" marker-end="url(#arrowhead)"/>
        <rect x="405.4" y="340" width="69.2" height="16" rx="3" class="c-mask"/>
        <text x="440" y="350" class="t-backend" font-size="9" text-anchor="middle">semantic OK</text>

        <path d="M 501 420 L 595 420" class="a-emphasis" stroke-width="1.8" marker-end="url(#arrowhead-emphasis)"/>
        <rect x="523.8" y="400" width="48.4" height="16" rx="3" class="c-mask"/>
        <text x="548" y="410" class="t-backend" font-size="9" text-anchor="middle">allowed</text>

        <path d="M 163 500 L 69 500" class="a-security" stroke-width="1.4" marker-end="url(#arrowhead-security)"/>
        <rect x="73.6" y="480" width="84.8" height="16" rx="3" class="c-mask"/>
        <text x="116" y="490" class="t-security" font-size="9" text-anchor="middle">block + refuse</text>

        <path d="M 595 560 L 69 560" class="a-default" stroke-width="1.4" stroke-dasharray="3,5" marker-end="url(#arrowhead)"/>
        <rect x="281.8" y="540" width="100.4" height="16" rx="3" class="c-mask"/>
        <text x="332" y="550" class="t-muted" font-size="9" text-anchor="middle">output guardrails</text>

        <!-- Activations -->
        <rect x="381" y="280" width="10" height="100" rx="3" class="c-mask"/>
        <rect x="381" y="280" width="10" height="100" rx="3" class="c-security" stroke-width="1"/>

        <!-- Participants -->
        <rect x="19" y="72" width="86" height="54" rx="6" class="c-mask"/>
        <rect x="19" y="72" width="86" height="54" rx="6" class="c-external" stroke-width="1.5"/>
        <text x="62" y="94" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">User</text>
        <text x="62" y="111" class="t-muted" font-size="7" text-anchor="middle">input</text>

        <rect x="127" y="72" width="86" height="54" rx="6" class="c-mask"/>
        <rect x="127" y="72" width="86" height="54" rx="6" class="c-security" stroke-width="1.5"/>
        <text x="170" y="94" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">Regex</text>
        <text x="170" y="111" class="t-muted" font-size="7" text-anchor="middle">fast path</text>

        <rect x="235" y="72" width="86" height="54" rx="6" class="c-mask"/>
        <rect x="235" y="72" width="86" height="54" rx="6" class="c-security" stroke-width="1.5"/>
        <text x="278" y="94" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">PII</text>
        <text x="278" y="111" class="t-muted" font-size="7" text-anchor="middle">detect</text>

        <rect x="343" y="72" width="86" height="54" rx="6" class="c-mask"/>
        <rect x="343" y="72" width="86" height="54" rx="6" class="c-security" stroke-width="1.5"/>
        <text x="386" y="94" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">NeMo</text>
        <text x="386" y="111" class="t-muted" font-size="7" text-anchor="middle">Colang</text>

        <rect x="451" y="72" width="86" height="54" rx="6" class="c-mask"/>
        <rect x="451" y="72" width="86" height="54" rx="6" class="c-security" stroke-width="1.5"/>
        <text x="494" y="94" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">Groq 8B</text>
        <text x="494" y="111" class="t-muted" font-size="7" text-anchor="middle">self-check</text>

        <rect x="559" y="72" width="86" height="54" rx="6" class="c-mask"/>
        <rect x="559" y="72" width="86" height="54" rx="6" class="c-backend" stroke-width="1.5"/>
        <text x="602" y="94" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">Router</text>
        <text x="602" y="111" class="t-muted" font-size="7" text-anchor="middle">if allowed</text>

        <!-- Legend -->
        <text x="150" y="646" class="t-primary" font-size="10" font-weight="600">Legend</text>
        <path d="M 150 666 L 184 666" class="a-emphasis" stroke-width="1.8" marker-end="url(#arrowhead-emphasis)"/>
        <text x="193" y="669" class="t-muted" font-size="8">request</text>
        <path d="M 270 666 L 304 666" class="a-default" stroke-width="1.4" stroke-dasharray="3,5" marker-end="url(#arrowhead)"/>
        <text x="313" y="669" class="t-muted" font-size="8">return</text>
        <path d="M 385 666 L 419 666" class="a-security" stroke-width="1.4" marker-end="url(#arrowhead-security)"/>
        <text x="428" y="669" class="t-muted" font-size="8">security</text>
        <path d="M 530 666 L 564 666" class="a-dashed" stroke-width="1.4" marker-end="url(#arrowhead-dashed)"/>
        <text x="573" y="669" class="t-muted" font-size="8">async trace</text>
      </svg>