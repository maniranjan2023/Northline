        <rect x="446" y="46" width="168" height="500" rx="10" class="c-lane" stroke-width="1"/>
        <text x="530" y="68" class="t-dim" font-size="9" font-weight="600" text-anchor="middle">03 / Run</text>

        <rect x="661" y="46" width="168" height="500" rx="10" class="c-lane" stroke-width="1"/>
        <text x="745" y="68" class="t-dim" font-size="9" font-weight="600" text-anchor="middle">04 / Save</text>

