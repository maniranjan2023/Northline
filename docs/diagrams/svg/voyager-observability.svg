        <rect x="48" y="300" width="824" height="280" rx="10" class="c-lane" stroke-width="1"/>
        <text x="62" y="318" class="t-dim" font-size="9" font-weight="600">02 / TRIP RUN</text>

        <!-- Lifelines -->
        <path d="M 62 142 L 62 655" class="a-default" stroke-width="0.8" stroke-dasharray="3,7"/>
